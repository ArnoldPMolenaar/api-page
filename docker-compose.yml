services:
  dev:
    hostname: api_page_dev
    container_name: api_page_dev
    build:
      context: .
      dockerfile: docker/development.dockerfile
    env_file:
      - ./.env
    volumes:
      - .:/app
    depends_on:
      - valkey
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: "host"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "[ \"$(wget -qS --spider http://127.0.0.1:5007/health 2>&1 | awk '/HTTP\\//{code=$2} END{print code}')\" = \"204\" ]",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    command: ["air"]
  prod:
    hostname: api_page_prod
    container_name: api_page_prod
    build:
      context: .
      dockerfile: docker/production.dockerfile
    env_file:
      - ./.env
    volumes:
      - .:/build
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: "host"
    command: ["/api"]
  prod_probe:
    image: curlimages/curl:8.16.0
    container_name: api_mail_prod_probe
    network_mode: "host"
    profiles: ["local"]
    depends_on:
      - prod
    command: ["sh", "-c", "sleep infinity"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:5007/health); [ \"$$code\" = \"204\" ]",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
  valkey:
    container_name: api_page_valkey
    hostname: api_page_valkey
    build:
      context: .
      dockerfile: docker/valkey.dockerfile
    volumes:
      - ./docker/scripts/valkey.conf:/usr/local/etc/valkey/valkey.conf
      - ./data:/data
    command: sh -c "/usr/local/etc/valkey/valkey.sh"
    # Run as privileged to allow the container to change the vm.overcommit_memory setting.
    privileged: true
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: "host"